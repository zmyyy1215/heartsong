<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>心声点歌机</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    min-height: 100vh; min-height: 100dvh;
    background: linear-gradient(135deg,
      #c9a7eb, #dbb8de, #f0c6d2, #fad0c4, #f0d0e8,
      #d4b8e8, #e8c4d8, #c9a7eb
    );
    background-size: 600% 600%;
    animation: bgFlow 20s ease infinite;
    background-attachment: fixed;
    display: flex; flex-direction: column; align-items: center;
    -webkit-tap-highlight-color: transparent;
    -webkit-overflow-scrolling: touch;
    overflow-x: hidden;
  }
  @keyframes bgFlow {
    0%   { background-position: 0% 50%; }
    25%  { background-position: 50% 0%; }
    50%  { background-position: 100% 50%; }
    75%  { background-position: 50% 100%; }
    100% { background-position: 0% 50%; }
  }

  /* ========== 首次点击遮罩 ========== */
  .overlay {
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(8, 6, 22, 0.88);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    cursor: pointer; transition: opacity 0.6s ease;
  }
  .overlay.hidden { opacity: 0; pointer-events: none; }
  .overlay-icon { font-size: 60px; animation: float 2.2s ease-in-out infinite; margin-bottom: 20px; }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }
  .overlay-text { color: #fff; font-size: 20px; font-weight: 600; letter-spacing: 2px; text-align: center; line-height: 1.6; }
  .overlay-sub  { color: rgba(255,255,255,0.7); font-size: 14px; margin-top: 8px; }

  /* ========== 主容器 ========== */
  .container {
    width: 100%; max-width: 480px; padding: 30px 20px 40px;
    display: flex; flex-direction: column; align-items: center;
    position: relative;
  }

  /* ========== 标题 ========== */
  .title { font-size: 26px; font-weight: 700; color: #4a2040; text-align: center; margin-bottom: 6px; letter-spacing: 1px; }
  .subtitle { font-size: 13px; color: #7a5a7a; margin-bottom: 20px; text-align: center; }

  /* ========== 舞台：泡泡和播放面板共享位置 ========== */
  .stage {
    width: 100%; max-width: 440px;
    position: relative;
    min-height: 280px;
    display: flex; align-items: center; justify-content: center;
  }

  /* ========== 心情泡泡区 ========== */
  .mood-grid {
    width: 100%;
    display: flex; flex-wrap: wrap; justify-content: center;
    align-items: center; align-content: center;
    gap: 12px 14px; padding: 10px 4px;
    transition: opacity 0.35s ease, transform 0.35s ease;
  }
  .mood-grid.fading { opacity: 0; transform: scale(0.9); pointer-events: none; }

  /* 圆形泡泡 */
  .mood-btn {
    position: relative;
    width: 80px; height: 80px; border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.45);
    background: rgba(255,255,255,0.3);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    color: #4a2040; font-size: 13px; font-weight: 500;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 2px; line-height: 1;
    cursor: pointer;
    box-shadow:
      0 3px 12px rgba(100,40,80,0.1),
      inset 0 1px 2px rgba(255,255,255,0.5),
      inset 0 -2px 4px rgba(0,0,0,0.06);
    -webkit-tap-highlight-color: transparent;
    will-change: transform, opacity;
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
                opacity 0.4s ease, box-shadow 0.4s ease,
                background 0.4s ease, border-color 0.4s ease;
  }
  /* 高光 */
  .mood-btn::before {
    content: ""; position: absolute; top: 10px; left: 16px;
    width: 18px; height: 10px; border-radius: 50%;
    background: rgba(255,255,255,0.4);
    transform: rotate(-25deg); pointer-events: none;
  }
  /* 大小不一 */
  .mood-btn:nth-child(3n+1) { width: 74px; height: 74px; font-size: 12px; }
  .mood-btn:nth-child(3n+3) { width: 86px; height: 86px; font-size: 14px; }
  .mood-btn:nth-child(1)  { width: 92px; height: 92px; font-size: 15px; }
  .mood-btn:nth-child(7)  { width: 90px; height: 90px; font-size: 15px; }
  .mood-btn:nth-child(13) { width: 92px; height: 92px; font-size: 15px; }
  .mood-btn:nth-child(14) { width: 90px; height: 90px; font-size: 15px; }
  .mood-btn:nth-child(15) { width: 92px; height: 92px; font-size: 15px; }

  /* 缓慢挤压漂移 */
  @keyframes driftA {
    0%, 100% { transform: translate(0, 0); }
    30% { transform: translate(6px, -5px); }
    60% { transform: translate(-4px, 3px); }
    85% { transform: translate(2px, 4px); }
  }
  @keyframes driftB {
    0%, 100% { transform: translate(0, 0); }
    25% { transform: translate(-5px, -4px); }
    55% { transform: translate(4px, 6px); }
    80% { transform: translate(-3px, -2px); }
  }
  @keyframes driftC {
    0%, 100% { transform: translate(0, 0); }
    35% { transform: translate(-5px, 5px); }
    50% { transform: translate(6px, -2px); }
    75% { transform: translate(-2px, -5px); }
  }
  .mood-btn:nth-child(5n+1) { animation: driftA 6s ease-in-out infinite; }
  .mood-btn:nth-child(5n+2) { animation: driftB 7s ease-in-out infinite; animation-delay: 0.8s; }
  .mood-btn:nth-child(5n+3) { animation: driftC 5.5s ease-in-out infinite; animation-delay: 1.5s; }
  .mood-btn:nth-child(5n+4) { animation: driftA 6.5s ease-in-out infinite; animation-delay: 2.2s; }
  .mood-btn:nth-child(5n+5) { animation: driftB 5.8s ease-in-out infinite; animation-delay: 3s; }

  .mood-btn:active { transform: scale(0.88); transition: transform 0.1s ease; }

  /* 选中态：浅蓝渐变发光 */
  .mood-btn.active {
    background: linear-gradient(135deg, rgba(140,200,235,0.55), rgba(100,170,220,0.5), rgba(160,215,245,0.55));
    color: #fff; border-color: rgba(180,220,245,0.65);
    box-shadow:
      0 0 30px rgba(130,190,230,0.5),
      0 0 0 5px rgba(130,190,230,0.22),
      inset 0 1px 2px rgba(255,255,255,0.45);
    transform: scale(1.15); z-index: 5;
    animation: activeGlow 2s ease-in-out infinite;
    font-weight: 700;
  }
  @keyframes activeGlow {
    0%, 100% { box-shadow: 0 0 30px rgba(130,190,230,0.5), 0 0 0 5px rgba(130,190,230,0.22); }
    50% { box-shadow: 0 0 50px rgba(160,210,245,0.65), 0 0 0 10px rgba(130,190,230,0.38); }
  }

  /* ========== 碎裂动画 ========== */
  @keyframes shatter {
    0%   { transform: scale(1); opacity: 1; filter: blur(0); }
    25%  { transform: scale(1.05) rotate(2deg); opacity: 0.9; filter: blur(0); }
    60%  { transform: scale(0.5) rotate(8deg); opacity: 0.4; filter: blur(2px); }
    100% { transform: scale(0.1) rotate(20deg); opacity: 0; filter: blur(8px); }
  }
  .mood-btn.shattering {
    animation: shatter 1.0s cubic-bezier(0.5, 0, 0.75, 0.6) forwards !important;
    pointer-events: none;
  }

  /* 选中泡泡放大占屏 */
  @keyframes bubbleExpand {
    0%   { transform: scale(1); border-radius: 50%; opacity: 1; }
    30%  { transform: scale(1.6); border-radius: 50%; opacity: 1; }
    60%  { transform: scale(3.5); border-radius: 48%; opacity: 0.85; }
    100% { transform: scale(9); border-radius: 35%; opacity: 0; }
  }
  .mood-btn.expanding {
    animation: bubbleExpand 1.5s ease-out forwards !important;
    pointer-events: none;
    background: linear-gradient(135deg, rgba(140,200,235,0.45), rgba(100,170,220,0.4), rgba(160,215,245,0.45));
    border-color: rgba(180,220,245,0.5);
  }

  /* ========== 播放面板（初始隐藏，覆盖在舞台上方） ========== */
  .player-panel {
    position: absolute; top: 0; left: 0; right: 0;
    display: flex; flex-direction: column; align-items: center;
    opacity: 0; transform: translateY(20px) scale(0.92);
    transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    pointer-events: none; padding-top: 0;
  }
  .player-panel.revealed {
    opacity: 1; transform: translateY(0) scale(1);
    pointer-events: auto;
  }

  /* 唱片 */
  .disc-wrapper { width: 200px; height: 200px; margin: 0 0 18px; position: relative; display: flex; align-items: center; justify-content: center; }
  .disc {
    width: 180px; height: 180px; border-radius: 50%; position: relative;
    background: radial-gradient(circle at 50% 50%,
      #1a1a1a 0%, #2a2a2a 8%, #111 15%, #222 22%,
      #1a1a1a 28%, #2a2a2a 35%, #111 42%,
      #1a1a1a 48%, #222 55%, #111 62%,
      #2a2a2a 68%, #1a1a1a 72%);
    box-shadow: 0 8px 36px rgba(0,0,0,0.5), 0 0 0 4px rgba(0,0,0,0.3), 0 0 0 6px rgba(255,255,255,0.06);
    overflow: hidden;
  }
  .disc::before {
    content: ""; position: absolute; inset: 0; border-radius: 50%;
    background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 40%, transparent 60%, rgba(255,255,255,0.03) 100%);
    z-index: 2; pointer-events: none;
  }
  .disc.spinning { animation: spin 3s linear infinite; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .disc-label {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 60px; height: 60px; border-radius: 50%;
    background: linear-gradient(135deg, #b8963e, #8a6828);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; color: #fff;
    text-align: center; line-height: 1.3; letter-spacing: 1px; z-index: 3;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4), inset 0 1px 2px rgba(255,255,255,0.25);
  }
  .disc-label::after {
    content: ""; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 6px; height: 6px; border-radius: 50%; background: #2a1a08;
  }

  /* 歌名 */
  .song-name {
    font-size: 17px; font-weight: 700; color: #4a2040;
    margin-bottom: 8px; min-height: 24px; text-align: center;
    transition: opacity 0.4s;
  }

  /* 悄悄话 */
  .whisper-box {
    background: rgba(255,255,255,0.45);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    border-radius: 16px; padding: 18px 22px;
    max-width: 380px; width: 100%; min-height: 60px;
    text-align: center; color: #4a2040; font-size: 15px;
    line-height: 1.7; letter-spacing: 0.5px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.06);
    opacity: 0; transform: translateY(10px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }
  .whisper-box.show { opacity: 1; transform: translateY(0); }

  /* 倒带按钮 */
  .rewind-btn {
    margin-top: 18px;
    width: 44px; height: 44px; border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.4);
    background: rgba(255,255,255,0.35);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    color: #4a2040; font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.3s ease;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    -webkit-tap-highlight-color: transparent;
  }
  .rewind-btn:active { transform: scale(0.9); background: rgba(255,255,255,0.55); }

  /* 底部 */
  .footer {
    margin-top: 24px; color: rgba(74,32,64,0.45);
    font-size: 12px; letter-spacing: 1px; text-align: center;
  }

  @media (max-width: 360px) {
    .title { font-size: 22px; }
    .disc-wrapper { width: 160px; height: 160px; }
    .disc { width: 144px; height: 144px; }
    .disc-label { width: 48px; height: 48px; font-size: 11px; }
    .mood-grid { gap: 8px 10px; }
    .mood-btn { width: 64px !important; height: 64px !important; font-size: 11px !important; }
    .mood-btn:nth-child(1), .mood-btn:nth-child(7), .mood-btn:nth-child(13),
    .mood-btn:nth-child(14), .mood-btn:nth-child(15) { width: 74px !important; height: 74px !important; font-size: 13px !important; }
  }
</style>
</head>
<body>

<div class="overlay" id="overlay">
  <div class="overlay-icon">🎵</div>
  <div class="overlay-text">轻触屏幕<br>开启你的专属电台</div>
  <div class="overlay-sub">—— 给你的邓紫棋留声机 ——</div>
</div>

<div class="container">
  <div class="title">🎶 打开我的留声机</div>
  <div class="subtitle">选一个心情，让我为你唱歌</div>

  <!-- 舞台区：泡泡和播放面板共享位置 -->
  <div class="stage">
    <!-- 泡泡区 -->
    <div class="mood-grid" id="moodGrid">
    <button class="mood-btn" data-mood="tired"     >🌙<br>有点累</button>
    <button class="mood-btn" data-mood="miss"      >💭<br>很想你</button>
    <button class="mood-btn" data-mood="courage"   >✨<br>要勇气</button>
    <button class="mood-btn" data-mood="happy"     >☀️<br>小开心</button>
    <button class="mood-btn" data-mood="rain"      >🌧️<br>有点雨</button>
    <button class="mood-btn" data-mood="fire"      >🔥<br>需要燃</button>
    <button class="mood-btn" data-mood="effort"    >💪<br>偷偷努力</button>
    <button class="mood-btn" data-mood="sentimental">🌸<br>很感性</button>
    <button class="mood-btn" data-mood="hug"       >🌠<br>求抱抱</button>
    <button class="mood-btn" data-mood="imperfect" >🌈<br>不完美</button>
    <button class="mood-btn" data-mood="special"   >🎂<br>特别日</button>
    <button class="mood-btn" data-mood="insomnia"  >💤<br>失眠</button>
    <button class="mood-btn" data-mood="random"    >🎲<br>随机</button>
    <button class="mood-btn" data-mood="slacking"  >🐟<br>摸鱼中</button>
    <button class="mood-btn" data-mood="offwork"   >🎉<br>下班啦</button>
  </div>

  <!-- 播放面板（初始隐藏） -->
  <div class="player-panel" id="playerPanel">
    <div class="disc-wrapper">
      <div class="disc" id="disc">
        <div class="disc-label">G.E.M.<br>♫</div>
      </div>
    </div>
    <div class="song-name" id="songName"></div>
    <div class="whisper-box" id="whisper"></div>
    <button class="rewind-btn" id="rewindBtn" title="倒带返回">⏪</button>
  </div>
  </div><!-- /stage -->

  <div class="footer">把耳朵借我几分钟，就给你听。</div>
</div>

<audio id="audio" preload="none"></audio>

<script>
(function() {

  /* ================================================================
   *  30首歌的心情映射 & 悄悄话
   *  每首歌需将对应 mp3 放在 music/ 目录下。
   *  ================================================================
   *  格式: { file: "music/xxx.mp3", song: "歌名", whisper: "悄悄话" }
   *  ================================================================ */
  var MOODS = {

    /* ------ 🌙 有点累 ------ */
    tired: [
      { file: "music/daoshu.mp3",             song: "倒数",
        whisper: "累了就停下来数一数心跳。邓紫棋说「时针一直倒数着」，但在我的时间里，你可以永远不赶路。" },
      { file: "music/touming.mp3",            song: "透明",
        whisper: "有时候累了反而看得更清楚。你知道吗，在你面前我从来不想透明——我想被你看见。" },
      { file: "music/henjiuyihou.mp3",        song: "很久以后",
        whisper: "很久以后回头看，今天的疲惫也会变成温柔的回忆。我会在那个「很久以后」等你。" }
    ],

    /* ------ 💭 很想你 ------ */
    miss: [
      { file: "music/guangnianzhiwai.mp3",    song: "光年之外",
        whisper: "想念可以跨越光年。虽然我们不总是见面，但每次想到你，都觉得宇宙也没那么大了。" },
      { file: "music/duoyuan.mp3",            song: "多远都要在一起",
        whisper: "邓紫棋唱距离不是问题，我也想对你说这句话。多远，都在心里。" },
      { file: "music/xihuanni.mp3",           song: "喜欢你",
        whisper: "喜欢你，这三个字很简单，但每次想到你的时候，它们就有了特别的分量。" }
    ],

    /* ------ ✨ 要勇气 ------ */
    courage: [
      { file: "music/xindexintiao.mp3",       song: "新的心跳",
        whisper: "每次心跳都是新的开始。我相信你可以，因为你是那种能让自己发光的人。" },
      { file: "music/walkonwater.mp3",        song: "Walk on Water",
        whisper: "连水面都能走过，还有什么不能面对呢？你比你想象中勇敢得多。" },
      { file: "music/motian.mp3",             song: "来自天堂的魔鬼",
        whisper: "勇气不是没有恐惧，而是带着恐惧依然前行。你可以摇摆，但别后退。" }
    ],

    /* ------ ☀️ 小开心 ------ */
    happy: [
      { file: "music/haoxiang.mp3",           song: "好想好想你",
        whisper: "开心的时候连空气都是甜的。每次看到你笑，就觉得今天已经很值得。" },
      { file: "music/tonghua.mp3",            song: "另一个童话",
        whisper: "你的小开心就是我的童话。不用很大，一点点的快乐就能照亮一整天。" },
      { file: "music/chabuduo.mp3",           song: "差不多姑娘",
        whisper: "你才不是差不多姑娘。你笑起来的时候，世界都差你一点。" }
    ],

    /* ------ 🌧️ 有点雨 ------ */
    rain: [
      { file: "music/paomo.mp3",              song: "泡沫",
        whisper: "雨会停，泡沫会散，但阳光一定会再来。在下雨的时候，我陪你等彩虹。" },
      { file: "music/shunjian.mp3",           song: "瞬间",
        whisper: "有些瞬间会下雨，但雨滴落下的每个瞬间，也是天空在和大地说话。你的心情值得被听见。" },
      { file: "music/zaijian.mp3",            song: "再见",
        whisper: "把不开心说再见，给美好留一点空间。雨后的空气，最干净了。" }
    ],

    /* ------ 🔥 需要燃 ------ */
    fire: [
      { file: "music/motion.mp3",             song: "摩天动物园",
        whisper: "在这个大世界里，做那只不被驯服的动物吧。你的棱角就是你的光。" },
      { file: "music/chaonengli.mp3",         song: "超能力",
        whisper: "别怀疑，你本身就有超能力——做你自己这件事，谁也取代不了。" },
      { file: "music/pandeng.mp3",            song: "攀登",
        whisper: "所有的山峰都是给攀登者准备的。你已经在上坡了，每一步都算数。" }
    ],

    /* ------ 💪 偷偷努力 ------ */
    effort: [
      { file: "music/yilunifeng.mp3",         song: "一路逆风",
        whisper: "逆风的方向，更适合飞翔。我看到了你在默默努力的样子，很美。" },
      { file: "music/ouer.mp3",               song: "偶尔",
        whisper: "偶尔也给自己一点掌声吧。你偷偷努力的样子，真的很耀眼。" },
      { file: "music/pandeng.mp3",            song: "攀登",
        whisper: "不用告诉所有人你在爬山，一步一步走到山顶，他们自然就看到了。" }
    ],

    /* ------ 🌸 很感性 ------ */
    sentimental: [
      { file: "music/shuigongzhu.mp3",        song: "睡公主",
        whisper: "感性的人是醒着的做梦人。你的温柔和敏感，恰恰是你最特别的天赋。" },
      { file: "music/yushi.mp3",              song: "于是",
        whisper: "于是你哭了，于是你笑了，于是这就是真实的你。每一种情绪都值得被珍藏。" },
      { file: "music/chakekaojin.mp3",        song: "查克靠近",
        whisper: "像查克靠近一样，慢慢靠近自己的心。感性不是弱点，是你能感受更多。" }
    ],

    /* ------ 🌠 求抱抱 ------ */
    hug: [
      { file: "music/haoxiang.mp3",           song: "好想好想你",
        whisper: "隔着屏幕给你一个大大的拥抱。虽然现在碰不到，但这份温暖是真的。" },
      { file: "music/duoyuan.mp3",            song: "多远都要在一起",
        whisper: "距离从来不是问题。需要抱抱的时候，就想想有人在远方惦记着你。" },
      { file: "music/taohuanuo.mp3",          song: "桃花诺",
        whisper: "桃花诺，是春天最美的约定。就像我对你说的每一句话，都算数。" }
    ],

    /* ------ 🌈 不完美 ------ */
    imperfect: [
      { file: "music/juhao.mp3",              song: "句号",
        whisper: "有些事画上句号，是为了给新的开始留白。不完美也是一种完美。" },
      { file: "music/mangdian.mp3",           song: "盲点",
        whisper: "你觉得自己不够好的地方，其实在别人眼里刚好是特别之处。包括在我眼里。" },
      { file: "music/kuaile.mp3",             song: "你不是真正的快乐",
        whisper: "不用假装一切都好。在我这里，你可以不完美，可以不快乐，可以做真实的你。" }
    ],

    /* ------ 🎂 特别日 ------ */
    special: [
      { file: "music/qiji.mp3",               song: "奇迹",
        whisper: "每一个特别的日子都是一个小小的奇迹。而你的存在，就是最大的那个。" },
      { file: "music/daoshu.mp3",             song: "倒数",
        whisper: "每一个特别的日子都在倒数着到来。但我希望今天能慢一点过，让你记得久一点。" },
      { file: "music/danxing.mp3",            song: "单行的轨道",
        whisper: "特别的日子像单行轨道，一直往前走。但今天，我想让你停下来享受这一刻。" }
    ],

    /* ------ 💤 失眠 ------ */
    insomnia: [
      { file: "music/touming.mp3",            song: "透明",
        whisper: "深夜最清醒，也最容易想很多。但没关系，困了就睡，睡不着有我陪。" },
      { file: "music/henjiuyihou.mp3",        song: "很久以后",
        whisper: "失眠是因为心里装着太多事。试着放下一些，很久以后你会感谢今晚的这份放松。" },
      { file: "music/allaboutu.mp3",          song: "All About U",
        whisper: "夜深了，所有的思绪都是关于你。那就让这首歌陪你入睡吧，晚安。" }
    ],

    /* ------ 🐟 摸鱼中 ------ */
    slacking: [
      { file: "music/chabuduo.mp3",           song: "差不多姑娘",
        whisper: "摸鱼也是一种生产力！偶尔放空自己，给大脑充充电，等一下效率更高。" },
      { file: "music/tonghua.mp3",            song: "另一个童话",
        whisper: "偷偷摸个鱼，躲进属于自己的童话世界。几分钟而已，老板不会发现的。" },
      { file: "music/chaonengli.mp3",         song: "超能力",
        whisper: "摸鱼的时候最适合幻想——要是真有超能力，第一件事就是让时间暂停，再摸一会儿。" }
    ],

    /* ------ 🎉 下班啦 ------ */
    offwork: [
      { file: "music/xindexintiao.mp3",       song: "新的心跳",
        whisper: "下班这一刻，心跳都是自由的。把今天的辛苦关在门外，剩下的时间都是你的。" },
      { file: "music/haoxiang.mp3",           song: "好想好想你",
        whisper: "下班了，终于可以不用想工作了。接下来的时间，好好享受属于你的夜晚吧。" },
      { file: "music/daoshu.mp3",             song: "倒数",
        whisper: "倒数三二一，告别今日的忙碌。今天的你也辛苦啦，值得一首好歌。" }
    ]
  };

  /* ========== DOM ========== */
  var overlay     = document.getElementById("overlay");
  var moodGrid    = document.getElementById("moodGrid");
  var playerPanel = document.getElementById("playerPanel");
  var disc        = document.getElementById("disc");
  var songNameEl  = document.getElementById("songName");
  var whisperEl   = document.getElementById("whisper");
  var rewindBtn   = document.getElementById("rewindBtn");
  var audio       = document.getElementById("audio");

  var currentAudioSrc = null;
  var audioUnlocked   = false;
  var isTransitioning = false; // 动画进行中，禁止点击

  /* ========== 辅助 ========== */
  function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  function stopAndReset() {
    audio.pause(); audio.currentTime = 0;
    disc.classList.remove("spinning");
  }

  function showWhisper(text) {
    whisperEl.classList.remove("show");
    void whisperEl.offsetWidth;
    whisperEl.textContent = text;
    whisperEl.classList.add("show");
  }

  function playSong(songData) {
    stopAndReset();
    songNameEl.textContent = songData.song;
    audio.src = songData.file;
    currentAudioSrc = songData.file;
    var playPromise = audio.play();
    if (playPromise !== undefined) {
      playPromise.then(function() {
        disc.classList.add("spinning");
      }).catch(function(err) {
        console.log("播放失败: " + err.message);
        disc.classList.add("spinning");
      });
    }
    showWhisper(songData.whisper);
  }

  audio.addEventListener("ended", function() {
    disc.classList.remove("spinning");
  });

  audio.addEventListener("error", function() {
    disc.classList.remove("spinning");
    if (whisperEl.textContent && whisperEl.textContent.indexOf("还在路上") === -1) {
      showWhisper(whisperEl.textContent + "\n\n（这首歌还在路上，先看看这句话吧）");
    }
  });

  /* ========== 选中泡泡 → 碎裂 → 展开 → 显示播放器 ========== */
  moodGrid.addEventListener("click", function(e) {
    var btn = e.target.closest(".mood-btn");
    if (!btn || isTransitioning) return;

    var mood = btn.getAttribute("data-mood");

    // 先清除所有 active
    var allBtns = moodGrid.querySelectorAll(".mood-btn");
    allBtns.forEach(function(b) { b.classList.remove("active", "shattering", "expanding"); });

    // 标记选中
    btn.classList.add("active");
    isTransitioning = true;

    // Step 1: 其他泡泡碎裂 (延迟一点让 active 渲染)
    requestAnimationFrame(function() {
      allBtns.forEach(function(b) {
        if (b !== btn) b.classList.add("shattering");
      });

      // Step 2: 选中泡泡放大并消失 (等碎裂跑一多半再开始)
      setTimeout(function() {
        btn.classList.remove("active");
        btn.classList.add("expanding");

        // 放大到一半再淡出网格
        setTimeout(function() {
          moodGrid.classList.add("fading");
        }, 1100);
      }, 900);

      // Step 3: 显示播放面板 (等放大动画结束)
      setTimeout(function() {
        playerPanel.classList.add("revealed");

        // 选歌播放
        var songList;
        if (mood === "random") {
          var allSongs = [];
          Object.keys(MOODS).forEach(function(key) {
            allSongs = allSongs.concat(MOODS[key]);
          });
          var seen = {};
          allSongs = allSongs.filter(function(s) {
            if (seen[s.file]) return false;
            seen[s.file] = true; return true;
          });
          songList = allSongs;
        } else {
          songList = MOODS[mood];
        }
        if (songList && songList.length > 0) {
          playSong(pick(songList));
        }

        isTransitioning = false;
      }, 2500);
    });
  });

  /* ========== 倒带返回泡泡界面 ========== */
  rewindBtn.addEventListener("click", function() {
    if (isTransitioning) return;
    isTransitioning = true;

    // 停止播放
    stopAndReset();
    songNameEl.textContent = "";
    whisperEl.classList.remove("show");
    whisperEl.textContent = "";

    // 隐藏播放面板
    playerPanel.classList.remove("revealed");

    // 等面板淡出后再重置泡泡
    setTimeout(function() {
      var allBtns = moodGrid.querySelectorAll(".mood-btn");
      allBtns.forEach(function(b) { b.classList.remove("active", "shattering", "expanding"); });
      moodGrid.classList.remove("fading");
      isTransitioning = false;
    }, 700);
  });

  /* ========== 首次遮罩 ========== */
  overlay.addEventListener("click", function() {
    if (audioUnlocked) return;
    audioUnlocked = true;
    audio.volume = 0;
    audio.play().then(function() {
      audio.pause(); audio.currentTime = 0; audio.volume = 1;
    }).catch(function() { audio.volume = 1; });
    overlay.classList.add("hidden");
  });

})();
</script>
</body>
</html>
