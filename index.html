<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>心声点歌机</title>
<style>
  /* ========== 全局 Reset & 基础 ========== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    min-height: 100vh;
    min-height: 100dvh;
    background: linear-gradient(135deg, #c9a7eb 0%, #f0c6d2 40%, #fad0c4 100%);
    background-attachment: fixed;
    display: flex;
    flex-direction: column;
    align-items: center;
    -webkit-tap-highlight-color: transparent;
    -webkit-overflow-scrolling: touch;
    overflow-x: hidden;
  }

  /* ========== 首次点击遮罩 ========== */
  .overlay {
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(60, 30, 60, 0.82);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: opacity 0.5s ease;
  }
  .overlay.hidden { opacity: 0; pointer-events: none; }
  .overlay-icon { font-size: 64px; animation: float 2s ease-in-out infinite; margin-bottom: 20px; }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }
  .overlay-text {
    color: #fff; font-size: 20px; font-weight: 600;
    letter-spacing: 2px; text-align: center; line-height: 1.6;
  }
  .overlay-sub  { color: rgba(255,255,255,0.7); font-size: 14px; margin-top: 8px; }

  /* ========== 主容器 ========== */
  .container {
    width: 100%; max-width: 480px; padding: 30px 20px 40px;
    display: flex; flex-direction: column; align-items: center;
  }

  /* ========== 标题 ========== */
  .title {
    font-size: 26px; font-weight: 700; color: #4a2040;
    text-align: center; margin-bottom: 6px; letter-spacing: 1px;
  }
  .subtitle { font-size: 13px; color: #7a5a7a; margin-bottom: 28px; text-align: center; }

  /* ========== 心情胶囊滚动区 ========== */
  .mood-scroll {
    width: 100%; overflow-x: auto; white-space: nowrap;
    padding: 8px 0 16px; margin-bottom: 20px;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none; /* Firefox */
  }
  .mood-scroll::-webkit-scrollbar { display: none; } /* Chrome/Safari */
  .mood-scroll-inner {
    display: inline-flex; gap: 10px;
    padding: 0 10px;
  }
  .mood-btn {
    flex-shrink: 0;
    padding: 10px 18px;
    border-radius: 28px; border: none;
    background: rgba(255,255,255,0.55);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: #4a2040; font-size: 15px; font-weight: 500;
    white-space: nowrap; cursor: pointer;
    transition: all 0.25s ease;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    -webkit-tap-highlight-color: transparent;
  }
  .mood-btn:active { transform: scale(0.94); }
  .mood-btn.active {
    background: rgba(120, 60, 110, 0.85);
    color: #fff; box-shadow: 0 4px 16px rgba(100,40,80,0.25);
  }

  /* ========== 唱片区 ========== */
  .disc-wrapper {
    width: 200px; height: 200px; margin: 16px 0 20px;
    position: relative; display: flex; align-items: center; justify-content: center;
  }
  .disc {
    width: 180px; height: 180px; border-radius: 50%;
    object-fit: cover;
    box-shadow: 0 8px 32px rgba(80, 30, 60, 0.25);
    /* 默认不旋转，播放时加上 .spinning */
  }
  .disc.spinning { animation: spin 3s linear infinite; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .disc-center {
    position: absolute; width: 50px; height: 50px; border-radius: 50%;
    background: radial-gradient(circle, #eee, #bbb);
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
  }
  .disc-placeholder {
    width: 180px; height: 180px; border-radius: 50%;
    border: 3px dashed rgba(255,255,255,0.5);
    display: flex; align-items: center; justify-content: center;
    color: rgba(255,255,255,0.5); font-size: 14px;
  }

  /* ========== 歌名区 ========== */
  .song-name {
    font-size: 17px; font-weight: 600; color: #4a2040;
    margin-bottom: 6px; min-height: 24px; text-align: center;
    transition: opacity 0.3s;
  }

  /* ========== 悄悄话区 ========== */
  .whisper-box {
    background: rgba(255,255,255,0.5);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border-radius: 16px; padding: 18px 22px;
    max-width: 380px; width: 100%; min-height: 60px;
    text-align: center; color: #4a2040; font-size: 15px;
    line-height: 1.7; letter-spacing: 0.5px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.05);
    opacity: 0; transform: translateY(10px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }
  .whisper-box.show { opacity: 1; transform: translateY(0); }

  /* ========== 底部 ========== */
  .footer {
    margin-top: 32px; color: rgba(74,32,64,0.5);
    font-size: 12px; letter-spacing: 1px; text-align: center;
  }

  /* ========== 适配超小屏 ========== */
  @media (max-width: 360px) {
    .title { font-size: 22px; }
    .disc-wrapper { width: 160px; height: 160px; }
    .disc { width: 144px; height: 144px; }
    .disc-placeholder { width: 144px; height: 144px; font-size: 12px; }
    .disc-center { width: 40px; height: 40px; }
    .mood-btn { padding: 8px 14px; font-size: 13px; }
  }
</style>
</head>
<body>

<!-- ========== 首次点击遮罩 ========== -->
<div class="overlay" id="overlay">
  <div class="overlay-icon">🎵</div>
  <div class="overlay-text">轻触屏幕<br>开启你的专属电台</div>
  <div class="overlay-sub">—— 给你的邓紫棋留声机 ——</div>
</div>

<!-- ========== 主容器 ========== -->
<div class="container">
  <div class="title">🎶 打开我的留声机</div>
  <div class="subtitle">选一个心情，让我为你唱歌</div>

  <!-- 心情按钮 - 横向滚动 -->
  <div class="mood-scroll" id="moodScroll">
    <div class="mood-scroll-inner" id="moodBtns">
      <button class="mood-btn" data-mood="tired"     >🌙 有点累</button>
      <button class="mood-btn" data-mood="miss"      >💭 很想你</button>
      <button class="mood-btn" data-mood="courage"   >✨ 要勇气</button>
      <button class="mood-btn" data-mood="happy"     >☀️ 小开心</button>
      <button class="mood-btn" data-mood="rain"      >🌧️ 有点雨</button>
      <button class="mood-btn" data-mood="fire"      >🔥 需要燃</button>
      <button class="mood-btn" data-mood="effort"    >💪 偷偷努力</button>
      <button class="mood-btn" data-mood="sentimental">🌸 很感性</button>
      <button class="mood-btn" data-mood="hug"       >🌠 求抱抱</button>
      <button class="mood-btn" data-mood="imperfect" >🌈 不完美</button>
      <button class="mood-btn" data-mood="special"   >🎂 特别日</button>
      <button class="mood-btn" data-mood="insomnia"  >💤 失眠</button>
      <button class="mood-btn" data-mood="random"    >🎲 随机</button>
    </div>
  </div>

  <!-- 唱片 -->
  <div class="disc-wrapper">
    <!-- 有图片时显示 disc，无图片时显示 placeholder -->
    <img class="disc" id="disc" src="images/disc.png" alt="唱片" style="display:none;" onerror="this.style.display='none';document.getElementById('discPlaceholder').style.display='flex';">
    <div class="disc-placeholder" id="discPlaceholder" style="display:flex;">🎵</div>
    <div class="disc-center"></div>
  </div>

  <!-- 当前歌名 -->
  <div class="song-name" id="songName"></div>

  <!-- 悄悄话 -->
  <div class="whisper-box" id="whisper"></div>

  <!-- 底部 -->
  <div class="footer">把耳朵借我几分钟，就给你听。</div>
</div>

<!-- ========== 隐藏的 Audio 元素 ========== -->
<audio id="audio" preload="none"></audio>

<script>
(function() {
  /* ================================================================
   *  30首歌的心情映射 & 悄悄话
   *  每首歌需将对应 mp3 放在 music/ 目录下。
   *  文件名采用 心情前缀_歌名拼音.mp3，方便你手动放入时对照。
   *  ================================================================
   *  格式: { file: "music/xxx.mp3", song: "歌名", whisper: "悄悄话" }
   *  ================================================================ */
  /*
   * ============================================================
   *  你需要准备这 30 个 mp3 文件，放入 music/ 文件夹：
   *  ============================================================
   *   1. daoshu.mp3            — 倒数
   *   2. touming.mp3           — 透明
   *   3. henjiuyihou.mp3       — 很久以后
   *   4. guangnianzhiwai.mp3   — 光年之外
   *   5. duoyuan.mp3           — 多远都要在一起
   *   6. xihuanni.mp3          — 喜欢你
   *   7. xindexintiao.mp3      — 新的心跳
   *   8. walkonwater.mp3       — Walk on Water
   *   9. motian.mp3            — 来自天堂的魔鬼
   *  10. haoxiang.mp3          — 好想好想你
   *  11. tonghua.mp3           — 另一个童话
   *  12. chabuduo.mp3          — 差不多姑娘
   *  13. paomo.mp3             — 泡沫
   *  14. shunjian.mp3          — 瞬间
   *  15. zaijian.mp3           — 再见
   *  16. motion.mp3            — 摩天动物园
   *  17. chaonengli.mp3        — 超能力
   *  18. pandeng.mp3           — 攀登
   *  19. yilunifeng.mp3        — 一路逆风
   *  20. juhao.mp3             — 句号
   *  21. mangdian.mp3          — 盲点
   *  22. kuaile.mp3            — 你不是真正的快乐
   *  23. ouer.mp3              — 偶尔
   *  24. shuigongzhu.mp3       — 睡公主
   *  25. yushi.mp3             — 于是
   *  26. chakekaojin.mp3       — 查克靠近
   *  27. taohuanuo.mp3         — 桃花诺
   *  28. danxing.mp3           — 单行的轨道
   *  29. qiji.mp3              — 奇迹
   *  30. allaboutu.mp3         — All About U
   * ============================================================
   *  歌曲可共用：比如「倒数」同时出现在「有点累」和「求抱抱」
   *  中，它们都指向 music/daoshu.mp3，你只需放一个文件。
   * ============================================================ */
  var MOODS = {

    /* ------ 🌙 有点累 ------ */
    tired: [
      { file: "music/daoshu.mp3",             song: "倒数",
        whisper: "累了就停下来数一数心跳。邓紫棋说「时针一直倒数着」，但在我的时间里，你可以永远不赶路。" },
      { file: "music/touming.mp3",            song: "透明",
        whisper: "有时候累了反而看得更清楚。你知道吗，在你面前我从来不想透明——我想被你看见。" },
      { file: "music/henjiuyihou.mp3",        song: "很久以后",
        whisper: "很久以后回头看，今天的疲惫也会变成温柔的回忆。我会在那个「很久以后」等你。" }
    ],

    /* ------ 💭 很想你 ------ */
    miss: [
      { file: "music/guangnianzhiwai.mp3",    song: "光年之外",
        whisper: "想念可以跨越光年。虽然我们不总是见面，但每次想到你，都觉得宇宙也没那么大了。" },
      { file: "music/duoyuan.mp3",            song: "多远都要在一起",
        whisper: "邓紫棋唱距离不是问题，我也想对你说这句话。多远，都在心里。" },
      { file: "music/xihuanni.mp3",           song: "喜欢你",
        whisper: "喜欢你，这三个字很简单，但每次想到你的时候，它们就有了特别的分量。" }
    ],

    /* ------ ✨ 要勇气 ------ */
    courage: [
      { file: "music/xindexintiao.mp3",       song: "新的心跳",
        whisper: "每次心跳都是新的开始。我相信你可以，因为你是那种能让自己发光的人。" },
      { file: "music/walkonwater.mp3",        song: "Walk on Water",
        whisper: "连水面都能走过，还有什么不能面对呢？你比你想象中勇敢得多。" },
      { file: "music/motian.mp3",             song: "来自天堂的魔鬼",
        whisper: "勇气不是没有恐惧，而是带着恐惧依然前行。你可以摇摆，但别后退。" }
    ],

    /* ------ ☀️ 小开心 ------ */
    happy: [
      { file: "music/haoxiang.mp3",           song: "好想好想你",
        whisper: "开心的时候连空气都是甜的。每次看到你笑，就觉得今天已经很值得。" },
      { file: "music/tonghua.mp3",            song: "另一个童话",
        whisper: "你的小开心就是我的童话。不用很大，一点点的快乐就能照亮一整天。" },
      { file: "music/chabuduo.mp3",           song: "差不多姑娘",
        whisper: "你才不是差不多姑娘。你笑起来的时候，世界都差你一点。" }
    ],

    /* ------ 🌧️ 有点雨 ------ */
    rain: [
      { file: "music/paomo.mp3",              song: "泡沫",
        whisper: "雨会停，泡沫会散，但阳光一定会再来。在下雨的时候，我陪你等彩虹。" },
      { file: "music/shunjian.mp3",           song: "瞬间",
        whisper: "有些瞬间会下雨，但雨滴落下的每个瞬间，也是天空在和大地说话。你的心情值得被听见。" },
      { file: "music/zaijian.mp3",            song: "再见",
        whisper: "把不开心说再见，给美好留一点空间。雨后的空气，最干净了。" }
    ],

    /* ------ 🔥 需要燃 ------ */
    fire: [
      { file: "music/motion.mp3",             song: "摩天动物园",
        whisper: "在这个大世界里，做那只不被驯服的动物吧。你的棱角就是你的光。" },
      { file: "music/chaonengli.mp3",         song: "超能力",
        whisper: "别怀疑，你本身就有超能力——做你自己这件事，谁也取代不了。" },
      { file: "music/pandeng.mp3",            song: "攀登",
        whisper: "所有的山峰都是给攀登者准备的。你已经在上坡了，每一步都算数。" }
    ],

    /* ------ 💪 偷偷努力 ------ */
    effort: [
      { file: "music/yilunifeng.mp3",         song: "一路逆风",
        whisper: "逆风的方向，更适合飞翔。我看到了你在默默努力的样子，很美。" },
      { file: "music/ouer.mp3",               song: "偶尔",
        whisper: "偶尔也给自己一点掌声吧。你偷偷努力的样子，真的很耀眼。" },
      { file: "music/pandeng.mp3",            song: "攀登",
        whisper: "不用告诉所有人你在爬山，一步一步走到山顶，他们自然就看到了。" }
    ],

    /* ------ 🌸 很感性 ------ */
    sentimental: [
      { file: "music/shuigongzhu.mp3",        song: "睡公主",
        whisper: "感性的人是醒着的做梦人。你的温柔和敏感，恰恰是你最特别的天赋。" },
      { file: "music/yushi.mp3",              song: "于是",
        whisper: "于是你哭了，于是你笑了，于是这就是真实的你。每一种情绪都值得被珍藏。" },
      { file: "music/chakekaojin.mp3",        song: "查克靠近",
        whisper: "像查克靠近一样，慢慢靠近自己的心。感性不是弱点，是你能感受更多。" }
    ],

    /* ------ 🌠 求抱抱 ------ */
    hug: [
      { file: "music/haoxiang.mp3",           song: "好想好想你",
        whisper: "隔着屏幕给你一个大大的拥抱。虽然现在碰不到，但这份温暖是真的。" },
      { file: "music/duoyuan.mp3",            song: "多远都要在一起",
        whisper: "距离从来不是问题。需要抱抱的时候，就想想有人在远方惦记着你。" },
      { file: "music/taohuanuo.mp3",          song: "桃花诺",
        whisper: "桃花诺，是春天最美的约定。就像我对你说的每一句话，都算数。" }
    ],

    /* ------ 🌈 不完美 ------ */
    imperfect: [
      { file: "music/juhao.mp3",              song: "句号",
        whisper: "有些事画上句号，是为了给新的开始留白。不完美也是一种完美。" },
      { file: "music/mangdian.mp3",           song: "盲点",
        whisper: "你觉得自己不够好的地方，其实在别人眼里刚好是特别之处。包括在我眼里。" },
      { file: "music/kuaile.mp3",             song: "你不是真正的快乐",
        whisper: "不用假装一切都好。在我这里，你可以不完美，可以不快乐，可以做真实的你。" }
    ],

    /* ------ 🎂 特别日 ------ */
    special: [
      { file: "music/qiji.mp3",               song: "奇迹",
        whisper: "每一个特别的日子都是一个小小的奇迹。而你的存在，就是最大的那个。" },
      { file: "music/daoshu.mp3",             song: "倒数",
        whisper: "每一个特别的日子都在倒数着到来。但我希望今天能慢一点过，让你记得久一点。" },
      { file: "music/danxing.mp3",            song: "单行的轨道",
        whisper: "特别的日子像单行轨道，一直往前走。但今天，我想让你停下来享受这一刻。" }
    ],

    /* ------ 💤 失眠 ------ */
    insomnia: [
      { file: "music/touming.mp3",            song: "透明",
        whisper: "深夜最清醒，也最容易想很多。但没关系，困了就睡，睡不着有我陪。" },
      { file: "music/henjiuyihou.mp3",        song: "很久以后",
        whisper: "失眠是因为心里装着太多事。试着放下一些，很久以后你会感谢今晚的这份放松。" },
      { file: "music/allaboutu.mp3",          song: "All About U",
        whisper: "夜深了，所有的思绪都是关于你。那就让这首歌陪你入睡吧，晚安。" }
    ]
  };

  /* ========== DOM 元素 ========== */
  var overlay       = document.getElementById("overlay");
  var moodBtns      = document.getElementById("moodBtns");
  var disc          = document.getElementById("disc");
  var discPH        = document.getElementById("discPlaceholder");
  var songNameEl    = document.getElementById("songName");
  var whisperEl     = document.getElementById("whisper");
  var audio         = document.getElementById("audio");

  /* ========== 状态 ========== */
  var currentAudioSrc = null;   // 当前加载的音频 src
  var audioUnlocked    = false; // 用户是否已交互

  /* ========== 检测 disc.png 是否加载成功 ========== */
  // 尝试显示图片，如果之前缓存成功就显示，否则等 onload/onerror
  disc.onload = function() {
    disc.style.display = "block";
    discPH.style.display = "none";
  };
  // 若图片之前已缓存且加载成功，立即显示
  if (disc.complete && disc.naturalWidth > 0) {
    disc.style.display = "block";
    discPH.style.display = "none";
  }

  /* ========== 辅助函数 ========== */

  /** 随机选数组中的一项 */
  function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  /** 停止当前播放并重置唱片 */
  function stopAndReset() {
    audio.pause();
    audio.currentTime = 0;
    disc.classList.remove("spinning");
  }

  /** 显示悄悄话，带淡入动画（先移除再添加 show 以触发 transition） */
  function showWhisper(text) {
    whisperEl.classList.remove("show");
    // 强制回流，确保 transition 重新触发
    void whisperEl.offsetWidth;
    whisperEl.textContent = text;
    whisperEl.classList.add("show");
  }

  /** 播放指定歌曲 */
  function playSong(songData) {
    stopAndReset();

    // 更新歌名
    songNameEl.textContent = songData.song;

    // 设置音频源
    audio.src = songData.file;
    currentAudioSrc = songData.file;

    // 播放
    var playPromise = audio.play();
    if (playPromise !== undefined) {
      playPromise.then(function() {
        // 播放成功，唱片开始旋转
        disc.classList.add("spinning");
      }).catch(function(err) {
        // 自动播放被阻止或文件加载失败
        console.log("播放失败: " + err.message);
        disc.classList.add("spinning"); // 视觉上还是转
        // 如果是文件错误，不会是 AbortError
        if (err.name !== "AbortError") {
          // 可能是文件不存在，依然显示悄悄话
        }
      });
    }

    // 显示悄悄话
    showWhisper(songData.whisper);
  }

  /* ========== 音频事件 ========== */

  // 播放结束，停止旋转
  audio.addEventListener("ended", function() {
    disc.classList.remove("spinning");
  });

  // 音频错误处理：文件不存在或无法加载
  audio.addEventListener("error", function() {
    disc.classList.remove("spinning");
    // 悄悄话区域显示兜底文案（如果当前没有悄悄话或想覆盖）
    if (whisperEl.textContent && whisperEl.textContent.indexOf("还在路上") === -1) {
      showWhisper(whisperEl.textContent + "\n\n（这首歌还在路上，先看看这句话吧 💿）");
    }
    console.warn("音频文件加载失败: " + (currentAudioSrc || "未知"));
  });

  /* ========== 心情按钮点击 ========== */
  moodBtns.addEventListener("click", function(e) {
    var btn = e.target.closest(".mood-btn");
    if (!btn) return;

    var mood = btn.getAttribute("data-mood");

    // 高亮当前按钮
    var allBtns = moodBtns.querySelectorAll(".mood-btn");
    allBtns.forEach(function(b) { b.classList.remove("active"); });
    btn.classList.add("active");

    // 🎲 随机：从所有心情的所有歌曲中随机选一首
    var songList;
    if (mood === "random") {
      var allSongs = [];
      Object.keys(MOODS).forEach(function(key) {
        allSongs = allSongs.concat(MOODS[key]);
      });
      // 去重（按 file 路径）
      var seen = {};
      allSongs = allSongs.filter(function(s) {
        if (seen[s.file]) return false;
        seen[s.file] = true;
        return true;
      });
      songList = allSongs;
    } else {
      songList = MOODS[mood];
    }

    if (!songList || songList.length === 0) return;

    var chosen = pick(songList);
    playSong(chosen);
  });

  /* ========== 首次点击遮罩：解锁音频并隐藏遮罩 ========== */
  overlay.addEventListener("click", function() {
    if (audioUnlocked) return;
    audioUnlocked = true;

    // 尝试解锁音频上下文（iOS/微信 需要一次用户手势后 audio 才能播放）
    // 创建一个无声的短音频来"激活" audio context
    audio.volume = 0;
    audio.play().then(function() {
      audio.pause();
      audio.currentTime = 0;
      audio.volume = 1;
    }).catch(function() {
      audio.volume = 1;
    });

    overlay.classList.add("hidden");
  });

  /* ========== 初始化：默认显示 disc 或 placeholder ========== */
  // disc 的显示由 onload/onerror 和初始检测处理

})();
</script>

</body>
</html>
