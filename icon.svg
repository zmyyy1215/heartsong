<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b38ad4"/>
      <stop offset="30%" style="stop-color:#d4a8c8"/>
      <stop offset="60%" style="stop-color:#f0b8b0"/>
      <stop offset="100%" style="stop-color:#f5c8b8"/>
    </linearGradient>
    <linearGradient id="discShine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="labelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7b4397"/>
      <stop offset="100%" style="stop-color:#4a2260"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- 圆角背景 -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- 柔和光晕 -->
  <circle cx="220" cy="180" r="180" fill="url(#glow)"/>

  <!-- 唱片暗影 -->
  <circle cx="256" cy="230" r="155" fill="#00000018"/>

  <!-- 唱片主体 -->
  <circle cx="256" cy="230" r="150" fill="#1a1a1a"/>
  <circle cx="256" cy="230" r="150" fill="url(#discShine)"/>

  <!-- 唱片纹路 -->
  <circle cx="256" cy="230" r="130" fill="none" stroke="#2a2a2a" stroke-width="0.5" opacity="0.6"/>
  <circle cx="256" cy="230" r="110" fill="none" stroke="#2a2a2a" stroke-width="0.5" opacity="0.5"/>
  <circle cx="256" cy="230" r="90" fill="none" stroke="#2a2a2a" stroke-width="0.5" opacity="0.4"/>
  <circle cx="256" cy="230" r="70" fill="none" stroke="#2a2a2a" stroke-width="0.5" opacity="0.3"/>

  <!-- 唱片中心标签 -->
  <circle cx="256" cy="230" r="52" fill="url(#labelGrad)"/>
  <circle cx="256" cy="230" r="50" fill="none" stroke="#ffffff20" stroke-width="1"/>

  <!-- 标签上的音符 -->
  <text x="256" y="244" text-anchor="middle" font-family="sans-serif" font-size="36" font-weight="800" fill="#fff" opacity="0.9">♫</text>

  <!-- 中心小圆点 -->
  <circle cx="256" cy="230" r="8" fill="#1a1025"/>
  <circle cx="254" cy="228" r="3" fill="#ffffff30"/>

  <!-- 唱针臂 -->
  <g transform="translate(370, 90) rotate(25)">
    <circle cx="0" cy="0" r="18" fill="#e8d8c8" stroke="#d0c0b0" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="6" fill="#c0b0a0"/>
    <line x1="0" y1="18" x2="-8" y2="90" stroke="#d0c0b0" stroke-width="4" stroke-linecap="round"/>
    <line x1="-8" y1="90" x2="-20" y2="130" stroke="#c8b8a8" stroke-width="3.5" stroke-linecap="round"/>
    <!-- 唱针头 -->
    <circle cx="-20" cy="132" r="6" fill="#a09080"/>
  </g>

  <!-- 右上漂浮音符 1 -->
  <text x="340" y="105" font-family="sans-serif" font-size="28" fill="#ffffff" opacity="0.35" transform="rotate(15, 340, 105)">♪</text>

  <!-- 右下漂浮音符 2 -->
  <text x="175" y="405" font-family="sans-serif" font-size="22" fill="#ffffff" opacity="0.25" transform="rotate(-10, 175, 405)">♪</text>
</svg>
