<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b48ad4"/>
      <stop offset="100%" style="stop-color:#f0a8b8"/>
    </linearGradient>
  </defs>

  <!-- 圆角背景 -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- 简洁音乐符号：音符 + 心形轮廓 -->
  <g transform="translate(256,260)" fill="none" stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round">
    <!-- 音符主干 -->
    <line x1="0" y1="-80" x2="0" y2="60" stroke-width="10"/>
    <!-- 音符旗 -->
    <path d="M 0,-80 Q 60,-60 90,-30" stroke-width="8"/>
    <path d="M 0,-45 Q 55,-25 85,0" stroke-width="6"/>
    <!-- 音符圆点 -->
    <ellipse cx="-30" cy="50" rx="32" ry="26" fill="#ffffff" opacity="0.95"/>
  </g>
</svg>
